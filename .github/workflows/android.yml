name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev unzip zip zlib1g-dev openjdk-17-jdk
          python -m pip install --upgrade pip
          pip install --user --upgrade buildozer "cython<3.0.0" wheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create APK with Buildozer
        run: |
          buildozer init
          sed -i 's/title = My Application/title = Pepsi Super League/' buildozer.spec
          sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/requirements = python3, kivy/requirements = python3, kivy, openssl, requests, urllib3/' buildozer.spec
          buildozer -v android debug

      - name: Upload Finished APKs
        uses: actions/upload-artifact@v4
        with:
          name: Pepsi-App
          path: bin/*.apk
